<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carbon Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

h2, h3 {
  margin: 0;
}

/* ===== NAVBAR ===== */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #020617;
  padding: 15px 30px;
  box-shadow: 0 0 10px #00ffcc;
}

nav ul {
  display: flex;
  list-style: none;
  gap: 20px;
}

nav ul li {
  cursor: pointer;
  transition: 0.3s;
}

nav ul li:hover {
  color: #00ffcc;
}

/* ===== CONTAINER ===== */
.container {
  padding: 20px;
}

/* ===== CARDS ===== */
.cards {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.card {
  flex: 1;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,255,204,0.2);
}

.card:hover {
  transform: scale(1.05);
}

/* ===== FORM ===== */
.form {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.form input, .form select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #00ffcc;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* ===== TABLE ===== */
table {
  width: 100%;
  border-collapse: collapse;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  text-align: center;
}

th {
  background: #020617;
}

/* ===== LEADERBOARD ===== */
.leaderboard {
  margin-top: 20px;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
}

/* ===== CHART ===== */
.chart {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  height: 150px;
  margin-top: 20px;
}

.bar {
  width: 30px;
  background: #00ffcc;
  border-radius: 5px;
  transition: 0.3s;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>🌱 Carbon Tracker</h2>
  <ul>
    <li onclick="showSection('dashboard')">Dashboard</li>
    <li onclick="showSection('add')">Add Activity</li>
    <li onclick="showSection('history')">History</li>
  </ul>
</nav>

<div class="container">

  <!-- DASHBOARD -->
  <div id="dashboard">

    <div class="cards">
      <div class="card">
        <h3>Total Emissions</h3>
        <p id="total">0 kg</p>
      </div>

      <div class="card">
        <h3>Activities</h3>
        <p id="count">0</p>
      </div>

      <div class="card">
        <h3>Goal Progress</h3>
        <p id="goal">0%</p>
      </div>
    </div>

    <!-- CHART -->
    <div class="chart" id="chart"></div>

  </div>

  <!-- ADD ACTIVITY -->
  <div id="add" style="display:none" class="form">
    <h3>Add Activity</h3>

    <select id="category">
      <option value="travel">Travel</option>
      <option value="food">Food</option>
      <option value="electricity">Electricity</option>
    </select>

    <input type="number" id="amount" placeholder="Enter amount">
    <input type="date" id="date">

    <button onclick="addActivity()">Submit</button>
  </div>

  <!-- HISTORY -->
  <div id="history" style="display:none">
    <h3>Activity History</h3>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Category</th>
          <th>Amount</th>
          <th>CO₂</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script>

/* ===== DATA ===== */
let activities = JSON.parse(localStorage.getItem("data")) || [];

/* ===== EMISSION FACTORS ===== */
const factors = {
  travel: 0.21,
  food: 0.5,
  electricity: 0.8
};

/* ===== NAVIGATION ===== */
function showSection(section) {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("add").style.display = "none";
  document.getElementById("history").style.display = "none";

  document.getElementById(section).style.display = "block";
}

/* ===== ADD ACTIVITY ===== */
function addActivity() {
  const category = document.getElementById("category").value;
  const amount = document.getElementById("amount").value;
  const date = document.getElementById("date").value;

  if (!amount || !date) {
    alert("Fill all fields");
    return;
  }

  const emission = amount * factors[category];

  const entry = { category, amount, date, emission };
  activities.push(entry);

  localStorage.setItem("data", JSON.stringify(activities));

  updateUI();
  alert("Added successfully!");
}

/* ===== UPDATE UI ===== */
function updateUI() {
  let total = 0;
  document.getElementById("tableBody").innerHTML = "";

  activities.forEach(a => {
    total += a.emission;

    document.getElementById("tableBody").innerHTML += `
      <tr>
        <td>${a.date}</td>
        <td>${a.category}</td>
        <td>${a.amount}</td>
        <td>${a.emission.toFixed(2)}</td>
      </tr>
    `;
  });

  document.getElementById("total").innerText = total.toFixed(2) + " kg";
  document.getElementById("count").innerText = activities.length;

  const goal = 100;
  const progress = Math.min((total / goal) * 100, 100);
  document.getElementById("goal").innerText = progress.toFixed(0) + "%";

  renderChart();
}

/* ===== CHART ===== */
function renderChart() {
  const chart = document.getElementById("chart");
  chart.innerHTML = "";

  activities.slice(-5).forEach(a => {
    const bar = document.createElement("div");
    bar.className = "bar";
    bar.style.height = (a.emission * 20) + "px";
    chart.appendChild(bar);
  });
}

/* ===== INIT ===== */
updateUI();

</script>

</body>
</html>
